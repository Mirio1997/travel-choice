<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>雙北景點大對決</title>
  <style>
    /* 全局與排版設定 */
    * { box-sizing: border-box; font-family: "PingFang TC", "微軟正黑體", sans-serif; }
    body { margin: 0; background-color: #f4f6f9; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 500px; min-height: 100vh; background: #fff; padding: 20px; display: flex; flex-direction: column; }
    
    /* 標題區 */
    header { text-align: center; margin-bottom: 20px; }
    h1 { font-size: 26px; color: #2c3e50; margin-bottom: 10px; }
    .status { font-size: 16px; color: #666; background: #e9ecef; padding: 6px 16px; border-radius: 20px; display: inline-block; font-weight: bold; }
    
    /* 卡片設計 */
    .card-container { display: flex; flex-direction: column; gap: 15px; flex-grow: 1; }
    .card { border: 2px solid #e0e0e0; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.2s; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .card:active { border-color: #4a90e2; transform: scale(0.98); }
    .card img { width: 100%; height: 180px; object-fit: cover; display: block; }
    .card-content { padding: 16px; text-align: center; }
    .card-title { font-size: 24px; margin: 0 0 10px 0; color: #333; font-weight: bold; }
    
    /* TAG 標籤設計 */
    .tags-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
    .tag { background-color: #e3f2fd; color: #1976d2; font-size: 14px; padding: 4px 10px; border-radius: 8px; }

    .vs-badge { text-align: center; font-size: 20px; font-weight: bold; color: #aaa; margin: -5px 0; }
    
    /* 按鈕設計 */
    .action-btn { background: #ff7675; color: white; border: none; padding: 16px; font-size: 18px; border-radius: 12px; width: 100%; margin-top: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .action-btn:active { background: #d63031; }
    .action-btn.secondary { background: #74b9ff; margin-top: 10px; }
    .action-btn.secondary:active { background: #0984e3; }
    
    /* 排名結果區 */
    #result-screen { display: none; }
    .result-header { text-align: center; margin-bottom: 20px; }
    .rank-item { display: flex; align-items: center; padding: 15px 10px; border-bottom: 1px solid #eee; background: #fafafa; margin-bottom: 8px; border-radius: 8px; }
    .rank-num { font-size: 24px; font-weight: bold; color: #d63031; width: 45px; text-align: center; }
    .rank-info { flex-grow: 1; }
    .rank-title { font-size: 20px; font-weight: bold; margin: 0 0 5px 0; color: #2d3436; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>去哪裡𨑨迌？大對決</h1>
      <div class="status" id="round-text">已進行 0 次選擇</div>
    </header>

    <div id="game-screen" class="card-container">
      <div class="card" onclick="vote(0)">
        <img id="img-a" src="" alt="選項A">
        <div class="card-content">
          <h2 class="card-title" id="title-a">載入中...</h2>
          <div class="tags-container" id="tags-a"></div>
        </div>
      </div>
      
      <div class="vs-badge">VS</div>
      
      <div class="card" onclick="vote(1)">
        <img id="img-b" src="" alt="選項B">
        <div class="card-content">
          <h2 class="card-title" id="title-b">載入中...</h2>
          <div class="tags-container" id="tags-b"></div>
        </div>
      </div>
      
      <button class="action-btn" onclick="showRanking()">不想選了，看目前排名結果</button>
    </div>

    <div id="result-screen">
      <div class="result-header">
        <h2>🏆 你的專屬景點排行榜</h2>
        <p style="color: #666; margin-top: -10px;">根據剛才的選擇為您推薦</p>
      </div>
      <div id="ranking-list"></div>
      <button class="action-btn secondary" onclick="continueGame()">繼續對戰，微調排名</button>
    </div>
  </div>

  <script>
    // 20 個景點的資料庫，包含 TAG 分類與初始 Elo 積分
    let spots = [
      { id: 1, name: "大安森林公園", img: "https://images.unsplash.com/photo-1574259461536-231a54508480?auto=format&fit=crop&w=600&q=80", tags: ["自然生態", "散步野餐", "市區綠地"], rating: 1200, matches: 0 },
      { id: 2, name: "象山步道", img: "https://images.unsplash.com/photo-1543323067-27e163b0a2c0?auto=format&fit=crop&w=600&q=80", tags: ["健行步道", "自然生態", "台北夜景"], rating: 1200, matches: 0 },
      { id: 3, name: "劍潭山步道", img: "https://images.unsplash.com/photo-1628178822097-f82debf13110?auto=format&fit=crop&w=600&q=80", tags: ["健行步道", "城市景觀", "自然生態"], rating: 1200, matches: 0 },
      { id: 4, name: "士林官邸", img: "https://images.unsplash.com/photo-1582239460064-9b98ea5a8d4d?auto=format&fit=crop&w=600&q=80", tags: ["花園植栽", "自然生態", "歷史文化"], rating: 1200, matches: 0 },
      { id: 5, name: "大稻埕碼頭", img: "https://images.unsplash.com/photo-1598282367509-c189c445a60e?auto=format&fit=crop&w=600&q=80", tags: ["老街", "歷史文化", "河岸夕陽"], rating: 1200, matches: 0 },
      { id: 6, name: "淡水老街", img: "https://images.unsplash.com/photo-1603525547464-9040c5f242fc?auto=format&fit=crop&w=600&q=80", tags: ["老街", "在地美食", "河岸風光"], rating: 1200, matches: 0 },
      { id: 7, name: "剝皮寮歷史街區", img: "https://images.unsplash.com/photo-1610300624021-9989f660ba29?auto=format&fit=crop&w=600&q=80", tags: ["老街", "歷史古蹟", "傳統文化"], rating: 1200, matches: 0 },
      { id: 8, name: "北投溫泉博物館", img: "https://images.unsplash.com/photo-1580665961635-41e7dc1bf9dc?auto=format&fit=crop&w=600&q=80", tags: ["歷史文化", "溫泉歷史", "日式建築"], rating: 1200, matches: 0 },
      { id: 9, name: "鐵道部園區", img: "https://images.unsplash.com/photo-1565548348873-1ba81c900dd4?auto=format&fit=crop&w=600&q=80", tags: ["博物館", "歷史建築", "工業機械"], rating: 1200, matches: 0 },
      { id: 10, name: "故宮博物院", img: "https://images.unsplash.com/photo-1578335359048-2b8dbbe81112?auto=format&fit=crop&w=600&q=80", tags: ["博物館", "歷史文物", "室內展覽"], rating: 1200, matches: 0 },
      { id: 11, name: "林家花園", img: "https://images.unsplash.com/photo-1624386801905-1823bb1f0925?auto=format&fit=crop&w=600&q=80", tags: ["古典庭園", "歷史古蹟", "散步漫遊"], rating: 1200, matches: 0 },
      { id: 12, name: "中正紀念堂", img: "https://images.unsplash.com/photo-1563204990-2ee2a321901c?auto=format&fit=crop&w=600&q=80", tags: ["歷史建築", "廣闊廣場", "衛兵交接"], rating: 1200, matches: 0 },
      { id: 13, name: "華山1914文創園區", img: "https://images.unsplash.com/photo-1618625615712-4fb37707e716?auto=format&fit=crop&w=600&q=80", tags: ["文創展覽", "歷史建築", "特色小店"], rating: 1200, matches: 0 },
      { id: 14, name: "松山文創園區", img: "https://images.unsplash.com/photo-1588636402008-592f2b45eaf1?auto=format&fit=crop&w=600&q=80", tags: ["文創設計", "歷史建築", "休閒散步"], rating: 1200, matches: 0 },
      { id: 15, name: "寶藏巖藝術村", img: "https://images.unsplash.com/photo-1628178822088-3330f89d5f76?auto=format&fit=crop&w=600&q=80", tags: ["藝文聚落", "歷史建築", "尋幽探秘"], rating: 1200, matches: 0 },
      { id: 16, name: "臺北流行音樂中心", img: "https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?auto=format&fit=crop&w=600&q=80", tags: ["現代建築", "音樂展覽", "藝文空間"], rating: 1200, matches: 0 },
      { id: 17, name: "台北101", img: "https://images.unsplash.com/photo-1543322137-cb299fc881eb?auto=format&fit=crop&w=600&q=80", tags: ["都會地標", "逛街購物", "高空景觀"], rating: 1200, matches: 0 },
      { id: 18, name: "貓空纜車", img: "https://images.unsplash.com/photo-1586716012837-14e9f736af93?auto=format&fit=crop&w=600&q=80", tags: ["高空景觀", "品茗休閒", "山林風景"], rating: 1200, matches: 0 },
      { id: 19, name: "碧潭風景區", img: "https://images.unsplash.com/photo-1618331835717-801e976710b2?auto=format&fit=crop&w=600&q=80", tags: ["河岸風光", "踩天鵝船", "吊橋景觀"], rating: 1200, matches: 0 },
      { id: 20, name: "臺北市立動物園", img: "https://images.unsplash.com/photo-1564348574160-b6f3a7eb762b?auto=format&fit=crop&w=600&q=80", tags: ["主題樂園", "自然生態", "散步漫遊"], rating: 1200, matches: 0 }
    ];

    let currentPair = [];
    let voteCount = 0;

    // 將 TAG 陣列轉換為 HTML 標籤
    function renderTags(tagsArray) {
      let tagsHTML = "";
      tagsArray.forEach(tag => {
        tagsHTML += `<span class="tag">#${tag}</span>`;
      });
      return tagsHTML;
    }

    // 隨機挑選兩個景點 (優先挑選對戰次數少的)
    function pickPair() {
      spots.sort((a, b) => a.matches - b.matches || Math.random() - 0.5);
      currentPair = [spots[0], spots[1]];
      
      // 更新卡片 A
      document.getElementById('img-a').src = currentPair[0].img;
      document.getElementById('title-a').innerText = currentPair[0].name;
      document.getElementById('tags-a').innerHTML = renderTags(currentPair[0].tags);
      
      // 更新卡片 B
      document.getElementById('img-b').src = currentPair[1].img;
      document.getElementById('title-b').innerText = currentPair[1].name;
      document.getElementById('tags-b').innerHTML = renderTags(currentPair[1].tags);
      
      document.getElementById('round-text').innerText = `已進行 ${voteCount} 次選擇`;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 計算 Elo 積分
    function vote(winnerIndex) {
      const loserIndex = winnerIndex === 0 ? 1 : 0;
      const winner = currentPair[winnerIndex];
      const loser = currentPair[loserIndex];

      const K = 32; 
      const expectedWinner = 1 / (1 + Math.pow(10, (loser.rating - winner.rating) / 400));
      const expectedLoser = 1 / (1 + Math.pow(10, (winner.rating - loser.rating) / 400));

      winner.rating = Math.round(winner.rating + K * (1 - expectedWinner));
      loser.rating = Math.round(loser.rating + K * (0 - expectedLoser));
      winner.matches++;
      loser.matches++;
      voteCount++;

      pickPair(); 
    }

    // 顯示排名 (已移除分數顯示)
    function showRanking() {
      document.getElementById('game-screen').style.display = 'none';
      document.getElementById('result-screen').style.display = 'block';
      
      const list = document.getElementById('ranking-list');
      list.innerHTML = "";
      
      // 依照積分高低排序
      let sortedSpots = [...spots].sort((a, b) => b.rating - a.rating);
      
      // 只列出前 10 名避免畫面太長
      let topSpots = sortedSpots.slice(0, 10);
      
      topSpots.forEach((spot, index) => {
        list.innerHTML += `
          <div class="rank-item">
            <div class="rank-num">${index + 1}</div>
            <div class="rank-info">
              <p class="rank-title">${spot.name}</p>
              <div class="tags-container" style="justify-content: flex-start;">
                ${renderTags(spot.tags)}
              </div>
            </div>
          </div>
        `;
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 繼續遊戲
    function continueGame() {
      document.getElementById('result-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'flex';
      pickPair();
    }

    // 網頁載入時啟動
    window.onload = pickPair;
  </script>
</body>
</html>
